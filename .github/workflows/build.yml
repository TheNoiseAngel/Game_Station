name: Build & Package Portable Windows SDL2 Game

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-SDL2
          mingw-w64-x86_64-SDL2_ttf
          mingw-w64-x86_64-SDL2_mixer
          zip

    - name: Build executable
      run: |
        mkdir -p bin
        g++ -std=c++17 main.cpp -o bin/TetrisGame.exe \
          -I/mingw64/include/SDL2 \
          -lmingw32 -lSDL2main -lSDL2 -lSDL2_ttf -lSDL2_mixer

    - name: Copy required DLLs (automático + manual)
      run: |
        # Primero copiamos las DLL esenciales de SDL y MinGW
        cd /mingw64/bin
        cp -v SDL2.dll SDL2_ttf.dll SDL2_mixer.dll "$OLDPWD/bin/" 2>/dev/null || true
        cp -v libwinpthread-1.dll libstdc++-6.dll libgcc_s_seh-1.dll "$OLDPWD/bin/" 2>/dev/null || true

        # Ahora entramos en la carpeta bin del proyecto
        cd "$OLDPWD/bin"
        echo "=== Detectando dependencias automáticamente con ldd ==="
        # Usamos ldd para listar las DLLs que necesita el ejecutable
        ldd TetrisGame.exe | grep '=> /mingw64/bin/' | awk '{print $3}' | while read -r dll; do
          if [ -f "$dll" ]; then
            echo "Copiando $dll ..."
            cp -v "$dll" .
          fi
        done

        # Copia manual adicional (por si acaso, no hace daño)
        cd /mingw64/bin
        cp -v libfreetype-6.dll libbz2-1.dll libharfbuzz-0.dll libpng16-16.dll zlib1.dll "$OLDPWD/bin/" 2>/dev/null || true
        cp -v libgraphite2.dll libglib-2.0-0.dll libintl-8.dll libiconv-2.dll "$OLDPWD/bin/" 2>/dev/null || true
        cp -v libpcre*.dll "$OLDPWD/bin/" 2>/dev/null || true
        cp -v libmpg123-0.dll libmodplug-1.dll libFLAC.dll libwavpack-1.dll libxmp.dll "$OLDPWD/bin/" 2>/dev/null || true
        cp -v libvorbisfile-3.dll libvorbis-0.dll libogg-0.dll "$OLDPWD/bin/" 2>/dev/null || true
        cp -v libopusfile-0.dll libopus-0.dll "$OLDPWD/bin/" 2>/dev/null || true
        cp -v libbrotlidec.dll libbrotlicommon.dll "$OLDPWD/bin/" 2>/dev/null || true
      shell: msys2 {0}

    - name: Copy assets folder (if exists)
      run: |
        if [ -d "assets" ]; then
          cp -r assets bin/
        fi

    - name: Package ZIP
      run: |
        cd bin
        zip -r ../Tetris_Portable_Windows.zip *

    - uses: actions/upload-artifact@v4
      with:
        name: tetris-portable-windows
        path: Tetris_Portable_Windows.zip